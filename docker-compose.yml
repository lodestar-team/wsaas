services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     camp
      POSTGRES_PASSWORD: camp
      POSTGRES_DB:       ws_gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camp"]
      interval: 5s
      timeout: 3s
      retries: 10

  ws-gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GATEWAY_CONFIG: /app/config.toml
      RUST_LOG:       ws_gateway=info
    volumes:
      - ./config.toml:/app/config.toml:ro
    ports:
      - "8090:8090"

volumes:
  pgdata:
