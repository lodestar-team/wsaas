# Generated by yatr rollout — adjust as needed.

[tasks.fmt]
desc = "Format code"
run = ["cargo fmt"]

[tasks.fmt-check]
desc = "Check formatting"
sources = ["**/*.rs"]
run = ["cargo fmt --all --check"]

[tasks.check]
desc = "Type-check"
sources = ["**/*.rs", "**/Cargo.toml"]
run = ["cargo check --all-targets"]

[tasks.clippy]
desc = "Lint"
sources = ["**/*.rs", "**/Cargo.toml"]
run = ["cargo clippy --all-targets -- -D warnings"]

[tasks.test]
desc = "Run tests"
run = ["cargo test"]

[tasks.build]
desc = "Release build"
sources = ["**/*.rs", "**/Cargo.toml"]
run = ["cargo build --release"]

[tasks.ci]
desc = "CI pipeline"
depends = ["fmt-check", "clippy", "test"]

[tasks.up]
desc = "Start services"
foreground = true
run = ["docker compose up"]

[tasks.down]
desc = "Stop services"
run = ["docker compose down"]

[tasks.logs]
desc = "Tail logs"
foreground = true
run = ["docker compose logs -f"]
