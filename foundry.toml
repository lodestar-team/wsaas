[profile.default]
src    = "contracts/src"
out    = "out"
libs   = ["lib"]
test   = "contracts/test"
script = "contracts/script"
solc_version   = "0.8.27"
evm_version    = "cancun"
optimizer      = true
optimizer_runs = 200
remappings = [
    "@graphprotocol/horizon/=lib/contracts/packages/horizon/contracts/",
    "@graphprotocol/interfaces/=lib/contracts/packages/interfaces/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
arbitrum_one     = "${ARBITRUM_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
arbitrum_one     = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
